name: Daily Tweet @Madridhometech

on:
  schedule:
    # Cada día a las 9:00 hora de Madrid (UTC+1 en invierno, UTC+2 en verano)
    # Usamos 8:00 UTC que equivale a 9:00 en España (horario invierno)
    - cron: '0 8 * * *'
  workflow_dispatch:  # permite lanzarlo manualmente desde GitHub

jobs:
  tweet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy python-dotenv

      - name: Publish tweet
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python tweet_daily.py --force
