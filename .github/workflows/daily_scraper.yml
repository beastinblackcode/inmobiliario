name: Daily Scraper

on:
  schedule:
    # Runs every 3 days (Mon/Thu) at 06:00 UTC (08:00 Madrid CEST)
    - cron: "0 6 * * 1,4"
  workflow_dispatch:
    # Permite lanzar manualmente desde la pestaña Actions de GitHub

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360         # ~3h venta + alquiler semanal; GitHub max = 360

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencias ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Descargar DB desde Google Drive ───────────────────────────────────
      - name: Download database from Google Drive
        env:
          GOOGLE_DRIVE_FILE_ID: ${{ secrets.GOOGLE_DRIVE_FILE_ID }}
        run: |
          python - <<'EOF'
          import os, gdown
          file_id = os.environ["GOOGLE_DRIVE_FILE_ID"]
          url = f"https://drive.google.com/uc?id={file_id}"
          print(f"Downloading DB (file_id={file_id}) ...")
          gdown.download(url, "real_estate.db", quiet=False)
          import pathlib
          size = pathlib.Path("real_estate.db").stat().st_size / 1024 / 1024
          print(f"Downloaded: {size:.1f} MB")
          EOF

      # ── 5. Scraping ──────────────────────────────────────────────────────────
      - name: Run scraper
        env:
          PYTHONUNBUFFERED: "1"
          BRIGHTDATA_USER: ${{ secrets.BRIGHTDATA_USER }}
          BRIGHTDATA_PASS: ${{ secrets.BRIGHTDATA_PASS }}
          BRIGHTDATA_HOST: ${{ secrets.BRIGHTDATA_HOST }}
          BRIGHTDATA_RESIDENTIAL_HOST: ${{ secrets.BRIGHTDATA_RESIDENTIAL_HOST }}
          BRIGHTDATA_RESIDENTIAL_USER: ${{ secrets.BRIGHTDATA_RESIDENTIAL_USER }}
          BRIGHTDATA_RESIDENTIAL_PASS: ${{ secrets.BRIGHTDATA_RESIDENTIAL_PASS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py
        continue-on-error: true    # Partial scrapes still provide valuable data

      # ── 5b. Pre-compute daily market snapshots ─────────────────────────────
      - name: Compute daily snapshots
        run: python compute_snapshots.py
        continue-on-error: true

      # ── 6. Email diario (opcional) ───────────────────────────────────────────
      - name: Send daily email report
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python email_report.py
        continue-on-error: true    # No bloquear el pipeline si el email falla

      # ── 6b. Publicar métricas en el dashboard público ───────────────────────
      - name: Export & publish public metrics
        env:
          THERMOMETER_PAT: ${{ secrets.THERMOMETER_PAT }}
        run: |
          # 1. Generar metrics.json
          python export_public_metrics.py -o metrics.json

          # 2. Clonar repo del termómetro
          git clone --depth 1 https://x-access-token:${THERMOMETER_PAT}@github.com/softniric-cyber/market-thermometer.git _thermometer

          # 3. Copiar y pushear
          cp metrics.json _thermometer/public/metrics.json
          cd _thermometer
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add public/metrics.json
          git diff --staged --quiet || {
            git commit -m "Update metrics $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          }
          cd .. && rm -rf _thermometer
        continue-on-error: true    # No bloquear si falla el dashboard

      # ── 7. Subir DB actualizada a Google Drive ───────────────────────────────
      - name: Upload updated database to Google Drive
        env:
          GOOGLE_SA_CREDENTIALS: ${{ secrets.GOOGLE_SA_CREDENTIALS }}
          GOOGLE_DRIVE_FILE_ID:  ${{ secrets.GOOGLE_DRIVE_FILE_ID }}
        run: python ci_drive_upload.py

      # ── 9. Resumen ────────────────────────────────────────────────────────────
      - name: Scrape summary
        run: |
          python - <<'EOF'
          from database import get_database_stats
          s = get_database_stats()
          print(f"✅ Active listings:  {s['active_count']:,}")
          print(f"   Sold/removed:     {s['sold_count']:,}")
          print(f"   Avg price:        €{s['avg_price']:,.0f}")
          EOF
